<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | National Controls Consulting</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.png">
</head>
<body class="inner-page">
    <header class="hero">
        <nav class="navbar">
            <a href="index.html" aria-label="Home">
                <img src="images/logo.png" alt="National Controls Consulting Logo" class="logo">
            </a>
            <ul class="nav-links">
                <li><a href="about.html">About</a></li>
                <li><a href="training.html">Training</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
        <div class="hero-content">
            <h1>Contact Us</h1>
            <p>Tell us about your project and we will follow up quickly.</p>
        </div>
    </header>

    <section class="section contact-section">
        <div class="section-content">
            <h2>Send a Message</h2>
            <form id="contactForm">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="text" name="company" placeholder="Company (Optional)">
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 National Controls Consulting | All rights reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
