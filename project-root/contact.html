<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | National Controls Consulting</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="icon" href="images/logo.png">
</head>
<body class="inner-page">
    <header class="hero">
        <div class="top-header">
            <a href="index.html" aria-label="Home">
                <img src="images/logo.png" alt="National Controls Consulting Logo" class="logo" style="height:80px;width:auto;">
            </a>
            <div class="hero-content">
                <h1>Contact Us</h1>
                <p>Tell us about your project and we will follow up quickly.</p>
            </div>
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="about.html">About</a></li>
                    <li><a href="training.html">Training</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section contact-section" style="max-width:100%; padding:80px 20px;">
        <div class="section-content" style="display:block; width:48vw; max-width:800px; margin:0 auto;">
            <h2>Send a Message</h2>
            <form id="contactForm" style="width:100%; max-width:none; margin:0 auto;">
                <input type="text" name="name" placeholder="Your Name" required style="width:100%;">
                <input type="email" name="email" placeholder="Your Email" required style="width:100%;">
                <input type="text" name="company" placeholder="Company (Optional)" style="width:100%;">
                <textarea name="message" rows="10" placeholder="Your Message" required style="width:100%; min-height:220px;"></textarea>
                <button type="submit" style="width:100%;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 National Controls Consulting | All rights reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
